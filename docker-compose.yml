services:
  postgres:
    image: postgres:17
    container_name: routine-quest-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: routine_quest
    ports:
      - "5432:5432"
    volumes:
      - routine-quest-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d routine_quest"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  routine-quest-postgres-data:
